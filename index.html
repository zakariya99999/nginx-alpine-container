<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaka's Landing Page</title>
    <style>
        /* General Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; /* Black background fallback */
            color: white;
            overflow: hidden;
        }

        /* Minecraft Shader Background */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                              url('https://wallpapersden.com');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Top Navigation Bar */
        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8); /* Semi-transparent black top bar */
            border-bottom: 2px solid #007bff;
        }

        nav a, .discord-tag {
            color: #007bff; /* Blue links */
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #00bcff; /* Lighter blue on hover */
            text-shadow: 0 0 10px #007bff;
        }

        /* Content Area */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 80px);
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 1);
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <nav>
        <a href="https://youtube.com/@ZakaPlaysMinecraft" target="_blank">Youtube (Subscribe please, If you are subscribed you the GOAT)</a>
        <span class="discord-tag">Discord: zaka706</span>
    </nav>

    <div class="container">
        <h1>ZakaPlaysMinecraft</h1>
        <p>Welcome to my official page.</p>
    </div>

</body>
</html>
